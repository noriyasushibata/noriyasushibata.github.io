<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESA Space Network Atlas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .section {
      margin-bottom: 40px;
    }
    .section h2 {
      color: #444;
      border-bottom: 2px solid #007cba;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #007cba;
      color: white;
    }
    tr:hover {
      background: #f9f9f9;
    }
    #map {
      height: 600px;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .leaflet-popup-content {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 ESA Space Network Atlas</h1>

    <div class="section">
      <h2>ESA Member Space Agencies</h2>
      <table id="agencies-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>City</th>
            <th>Country</th>
            <th>Address</th>
            <th>Latitude</th>
            <th>Longitude</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Interactive Map</h2>
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Load agency data
    fetch('esa_agencies.json')
      .then(response => response.json())
      .then(data => {
        // Populate table
        const tbody = document.querySelector('#agencies-table tbody');
        data.forEach(agency => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${agency.name}</td>
            <td>${agency.city}</td>
            <td>${agency.country}</td>
            <td>${agency.address}</td>
            <td>${agency.lat}</td>
            <td>${agency.lng}</td>
          `;
          tbody.appendChild(row);
        });

        // Initialize map
        const map = L.map('map').setView([50, 10], 4); // Centered on Europe

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Add markers
        data.forEach(agency => {
          const marker = L.marker([agency.lat, agency.lng]).addTo(map);
          marker.bindPopup(`
            <b>${agency.name}</b><br>
            ${agency.city}, ${agency.country}<br>
            ${agency.address}
          `);
        });

        // Fit map to show all markers
        const group = new L.featureGroup(data.map(agency => L.marker([agency.lat, agency.lng])));
        map.fitBounds(group.getBounds().pad(0.1));
      })
      .catch(error => console.error('Error loading data:', error));
  </script>
</body>
</html>
