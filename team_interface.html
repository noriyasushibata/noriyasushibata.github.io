<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Scheduler & Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 24px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e0e7ff;
    }

    .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      margin-right: 12px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1a202c;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: #e0e7ff;
      color: #667eea;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .badge.timezone {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge.occupation {
      background: #dcfce7;
      color: #166534;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .info-label {
      color: #718096;
      font-weight: 500;
    }

    .info-value {
      color: #2d3748;
      font-weight: 600;
    }

    .availability {
      background: #f7fafc;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #2d3748;
      margin-top: 12px;
      border-left: 3px solid #667eea;
    }

    .overlap-section {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .overlap-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: #1a202c;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .overlap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .day-box {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .day-box.no-overlap {
      opacity: 0.6;
      border-left-color: #cbd5e1;
    }

    .day-name {
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .overlap-time {
      font-size: 0.9rem;
      color: #4a5568;
      line-height: 1.5;
    }

    .no-overlap-msg {
      color: #a0aec0;
      font-style: italic;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .overlap-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>👥 Team Scheduler</h1>
      <p class="subtitle">Manage your team and find overlapping availability</p>
    </header>

    <!-- Team Members Grid -->
    <div class="grid" id="teamGrid"></div>

    <!-- Overlap Section -->
    <div class="overlap-section">
      <div class="overlap-title">⏰ Team Availability Overlap</div>
      <div class="overlap-grid" id="overlapGrid"></div>
    </div>
  </div>

  <script>
    const teamData = [
      {
        name: "Alice",
        age: 30,
        occupation: "Engineer",
        timezone: "PST",
        availability: "Mon-Fri, 9am-5pm",
      },
      {
        name: "Bob",
        age: 25,
        occupation: "Designer",
        timezone: "EST",
        availability: "Mon-Thu, 10am-6pm",
      },
      {
        name: "Carol",
        age: 27,
        occupation: "Writer",
        timezone: "CST",
        availability: "Mon-Thu, 8am-4pm",
      },
      {
        name: "Nori",
        age: 55,
        occupation: "Lawyer",
        timezone: "PST",
        availability: "Mon-Fri, 9am-6pm",
      },
    ];

    // Render team members
    function renderTeam() {
      const grid = document.getElementById("teamGrid");
      grid.innerHTML = teamData
        .map((member) => {
          const initials = member.name
            .split(" ")
            .map((n) => n[0])
            .join("");
          return `
        <div class="card">
          <div class="card-header">
            <div class="avatar">${initials}</div>
            <div class="card-title">${member.name}</div>
          </div>
          <div class="card-meta">
            <span class="badge occupation">${member.occupation}</span>
            <span class="badge timezone">${member.timezone}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Age:</span>
            <span class="info-value">${member.age}</span>
          </div>
          <div class="availability">
            <strong>📅 ${member.availability}</strong>
          </div>
        </div>
      `;
        })
        .join("");
    }

    // Render overlap (simplified for frontend)
    function renderOverlap() {
      const grid = document.getElementById("overlapGrid");
      const days = ["Mon", "Tue", "Wed", "Thu", "Fri"];

      grid.innerHTML = days
        .map((day) => {
          // Simplified: show if most team members are available
          const available = teamData.filter((m) =>
            m.availability.includes(day)
          );
          const allAvailable = available.length === teamData.length;

          return `
        <div class="day-box ${!allAvailable ? "no-overlap" : ""}">
          <div class="day-name">${day}</div>
          <div class="overlap-time">
            ${
              allAvailable
                ? `<strong>${available.length}/${teamData.length} available</strong><br/>Check server for UTC overlap`
                : `<span class="no-overlap-msg">❌ Partial overlap</span>`
            }
          </div>
        </div>
      `;
        })
        .join("");
    }

    // Initialize
    renderTeam();
    renderOverlap();
  </script>
</body>
</html>
